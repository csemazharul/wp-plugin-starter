services:
  wordpress:
    build:
      context: docker/php
      dockerfile: Dockerfile
    ports:
      - "${WP_PORT:-8080}:80"
    volumes:
      - wordpress_data:/var/www/html
      - .:/var/www/html/wp-content/plugins/${PLUGIN_SLUG:-wp-starter-kit}
      - ./docker/mu-plugins:/var/www/html/wp-content/mu-plugins
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DEBUG: "1"
      # PHP defines injected into wp-config.php by the official WP image
      WORDPRESS_CONFIG_EXTRA: >-
        define('WP_HOME', getenv('WP_URL') ?: 'http://localhost:8080');
        define('WP_SITEURL', getenv('WP_URL') ?: 'http://localhost:8080');
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
      WP_URL: "http://localhost:${WP_PORT:-8080}"
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      MAILHOG_ENABLED: "1"
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:-password}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL:-admin@example.com}
      PLUGIN_SLUG: ${PLUGIN_SLUG:-wp-starter-kit}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MARIADB_DATABASE: ${DB_NAME:-wordpress}
      MARIADB_USER: ${DB_USER:-wordpress}
      MARIADB_PASSWORD: ${DB_PASSWORD:-wordpress}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
      - "1025:1025"

volumes:
  wordpress_data:
  db_data:
